<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artify - Login Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between">

    <nav class="flex justify-between items-center px-8 py-4 bg-gray-800 border-b border-gray-700">
        <a href="index.html" class="text-2xl font-bold tracking-wider text-indigo-400">ARTIFY</a>
        <div class="space-x-4">
            <a href="index.html" class="text-gray-300 hover:text-white text-sm transition">Gallery</a>
            <a href="signup.html" class="text-gray-300 hover:text-white text-sm transition">Sign Up</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
            <h2 class="text-3xl font-extrabold text-center mb-6 text-indigo-400">Welcome Back</h2>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
                    <input type="email" id="login-email" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-indigo-500 text-white" placeholder="your-email@domain.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-indigo-500 text-white" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                    Sign In
                </button>
            </form>
            <p class="text-sm text-gray-400 mt-4 text-center">
                Don't have an account? <a href="signup.html" class="text-indigo-400 hover:underline">Sign Up</a>
            </p>
        </div>
    </main>

    <footer class="py-4 text-center text-sm text-gray-600 border-t border-gray-800 bg-gray-950">
        &copy; 2026 Artify Gallery. All rights reserved.
    </footer>

    <script>
        // Insert your precise credentials below
        const SUPABASE_URL = "https://lyrafeikpatjvifhavho.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5cmFmZWlrcGF0anZpZmhhdmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY0MTcsImV4cCI6MjA5NzM5MjQxN30"; 

        const supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert(error.message);
            } else {
                // Wait briefly to allow session sync to finish inside the browser cache
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            }
        });
    </script>
</body>
</html>
