<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artify // Join Now</title>
    <link rel="stylesheet" href="signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">ARTIFY<span>.</span></div>
            <h2>Create your account</h2>
            <p class="subtitle">Join to automatically save your download history.</p>

            <form id="signup-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <p class="switch-text">Already have an account? <a href="login.html">Log In</a></p>
            <p class="back-home"><a href="index.html">← Back to Gallery</a></p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lyrafeikpatjvifhavho.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5cmFmZWlrcGF0anZpZmhhdmhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTY0MTcsImV4cCI6MjA5NzM5MjQxN30.PQFoPOBh1zGlq3_FOvqmcZKlGDIw8AzLpiu96rAQu9A";
        
        // Changed to supabaseClient to bypass global CDN collisions
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { data: { display_name: name } }
            });

            if (error) {
                alert(error.message);
            } else {
                alert("Account created successfully! Check your email inbox for the verification link.");
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
